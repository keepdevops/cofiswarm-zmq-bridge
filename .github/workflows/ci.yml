# Per-repo CI — layout + tests (Node 24 / Go 1.22 when present).
# Install: ./scripts/install-repo-ci.sh [repo-name ...]
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/keepdevops/*
  GONOSUMDB: github.com/keepdevops/*

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: '1.22'
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        if: hashFiles('package.json') != ''
        with:
          node-version: 24
          cache: npm

      - name: Go private modules
        if: hashFiles('go.mod') != ''
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Layout + tests
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            npm ci
            npm test
          else
            make test
          fi
