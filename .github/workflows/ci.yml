# Per-repo CI — layout + tests (Node 24 / Go 1.22 when present).
# Install: ./scripts/install-repo-ci.sh [repo-name ...]
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v6
        if: hashFiles('package.json') != ''
        with:
          node-version: 24
          cache: npm

      - name: Layout + tests
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            npm ci
            npm test
          else
            make test
          fi
